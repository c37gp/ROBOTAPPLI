workflows:
  android-robot-build:
    name: Robot Android Stable Build

    max_build_duration: 120

    environment:
      java: 17
      android_signing:
        - robot_release
      vars:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m"

    scripts:
      - name: Show environment
        script: |
          java -version
          echo "Java Home: $JAVA_HOME"

      - name: Fix gradlew permissions
        script: |
          chmod +x gradlew

      - name: Verify gradlew
        script: |
          ./gradlew --version

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build debug APK
        script: |
          ./gradlew :android:app:assembleDebug --stacktrace

      - name: Build release APK
        script: |
          ./gradlew :android:app:assembleRelease --stacktrace

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - example@email.com
