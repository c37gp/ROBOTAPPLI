workflows:
  android-robot-build:
    name: Robot Android Stable Build

    max_build_duration: 120

    environment:
      java: 17
      vars:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m"

    scripts:
      - name: Show environment
        script: |
          java -version
          ls -R

      - name: Fix gradlew permissions
        script: |
          chmod +x gradlew

      - name: Verify gradlew
        script: |
          ./gradlew --version

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build debug APK
        script: |
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - android/app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - example@email.com
