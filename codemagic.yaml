workflows:
  android-build:
    name: Robot Android Build

    max_build_duration: 120

    environment:
      java: 17
      vars:
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m"

    scripts:
      - name: Check project structure
        script: |
          ls -R

      - name: Fix gradlew permissions
        script: |
          chmod +x gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build debug APK
        script: |
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - example@email.com
