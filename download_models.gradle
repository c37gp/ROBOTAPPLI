// Gradle script to automatically download TensorFlow Lite models
// This script will download models during the build if they don't exist in assets/

import groovy.json.JsonSlurper

// Model configurations
ext {    models = [
        [name: 'mobilenetv1', url: 'https://storage.googleapis.com/download.tensorflow.org/models/tflite/task_library/object_detection/mobile_object_localizer_v1_224_quant.tflite'],
        [name: 'efficientdet_lite0', url: 'https://storage.googleapis.com/download.tensorflow.org/models/tflite/task_library/object_detection/efficientdet_lite0_quant.tflite'],
        [name: 'efficientdet_lite1', url: 'https://storage.googleapis.com/download.tensorflow.org/models/tflite/task_library/object_detection/efficientdet_lite1_quant.tflite'],
        [name: 'efficientdet_lite2', url: 'https://storage.googleapis.com/download.tensorflow.org/models/tflite/task_library/object_detection/efficientdet_lite2_quant.tflite']
    ]
    assetsDir = file("${project.projectDir}/src/main/assets")
}

// Create assets directory if it doesn't exist
if (!assetsDir.exists()) {    assetsDir.mkdirs()
}

// Download models task
task downloadTFLiteModels(type: Copy) {    description = 'Downloads TensorFlow Lite model files'
    doFirst {        models.each { model ->
            def modelFile = file("${assetsDir}/${model.name}.tflite")
            if (!modelFile.exists()) {                println "Downloading ${model.name}.tflite from ${model.url}..."
                try {                    def connection = new URL(model.url).openConnection()
                    connection.connect()
                    modelFile.withOutputStream { output ->
                        output << connection.inputStream
                    }
                    println "Successfully downloaded ${model.name}.tflite (${modelFile.length()} bytes)"
                } catch (Exception e) {                    println "Failed to download ${model.name}.tflite: ${e.message}"
                    throw e
                }
            } else {                println "${model.name}.tflite already exists (${modelFile.length()} bytes), skipping..."
            }
        }
    }
}

// Make sure models are downloaded before building
preBuild.dependsOn downloadTFLiteModels
